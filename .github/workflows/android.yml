name: Android Build
on:
    workflow_dispatch:
    pull_request:
    push:
        branches:
            - master
        tags:
            - beta

# Builds the .NET MAUI head (ExtLibs/Xamarin/MissionPlanner.Maui) for net8.0-android.
# Replaces the retired legacy Xamarin.Android head, which can no longer consume the
# net8.0-android binding projects (UsbSerialForAndroid / GDALForAndroid).
env:
  MAUI_PROJECT: ExtLibs/Xamarin/MissionPlanner.Maui/MissionPlanner.Maui.csproj
  PUBLISH_DIR: ExtLibs/Xamarin/MissionPlanner.Maui/bin/Release/net8.0-android/publish

jobs:
  buildAAB:
    name: Build Release AAB
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 10

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Cache multiple paths
        uses: actions/cache@v4
        with:
          path: |
            **/obj/**
            !**.apk
            !**.so
            !**.aab
            !**.dll
            !jl
          key: ${{ runner.os }}-maui-buildAAB

      - name: Build
        shell: pwsh
        run: |
          $days = [int]((New-TimeSpan -Start 2020-01-01 -End (Get-Date)).totaldays * 100)
          dotnet publish $env:MAUI_PROJECT -f net8.0-android -c Release `
            -p:AndroidPackageFormat=aab `
            -p:ApplicationVersion=$days
          mkdir whatsnew
          git log --pretty=oneline --abbrev-commit -5 > whatsnew\whatsnew-en-US
          git log --pretty=oneline --abbrev-commit -5 > whatsnew\whatsnew-en-GB

      - name: Sign AAB
        if: ${{ github.event_name == 'push' }}
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ${{ env.PUBLISH_DIR }}
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: com.michaeloborne.MissionPlanner.aab.zip
          path: ${{ env.PUBLISH_DIR }}/*.aab

      - name: Upload Android Release to Play Store
        if: ${{ github.event_name == 'push' }}
        uses: r0adkll/upload-google-play@v1.0.11
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.michaeloborne.MissionPlanner
          releaseFiles: ${{ env.PUBLISH_DIR }}/com.michaeloborne.MissionPlanner-Signed.aab
          track: internal
          whatsNewDirectory: whatsnew


  buildAPK:
    name: Build Release APK
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 10

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Cache multiple paths
        uses: actions/cache@v4
        with:
          path: |
            **/obj/**
            !**.apk
            !**.so
            !**.aab
            !**.dll
            !jl
          key: ${{ runner.os }}-maui-buildAPK

      - name: Build
        shell: pwsh
        run: |
          $days = [int]((New-TimeSpan -Start 2020-01-01 -End (Get-Date)).totaldays * 100)
          dotnet publish $env:MAUI_PROJECT -f net8.0-android -c Release `
            -p:AndroidPackageFormat=apk `
            -p:ApplicationVersion=$days

      - name: Sign APK
        if: ${{ github.event_name == 'push' }}
        id: sign2
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ${{ env.PUBLISH_DIR }}
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - uses: actions/upload-artifact@v4
        with:
          name: com.michaeloborne.MissionPlanner.apk.zip
          path: ${{ env.PUBLISH_DIR }}/*.apk

      - uses: "marvinpinto/action-automatic-releases@v1.2.1"
        if: ${{ github.event_name == 'push' }}
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Android Development Build"
          files: '${{ env.PUBLISH_DIR }}/*.apk'
