name: Tests

on: [push, pull_request, workflow_dispatch]

jobs:
  unit-tests:
    name: Unit tests (Linux / net8.0)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MissionPlannerTests.Unit/MissionPlannerTests.Unit.csproj

      - name: Test
        run: >
          dotnet test MissionPlannerTests.Unit/MissionPlannerTests.Unit.csproj
          -f net8.0
          -c Debug
          --no-restore
          --filter "TestCategory=Unit"
          --logger "trx;LogFileName=unit.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/*.trx

  # Headless ArduPilot SITL integration tests. Much heavier than the unit job
  # (it builds ArduPilot from source), so it is gated: it runs on manual dispatch
  # or when a PR carries the "sitl" label. Tests self-skip if no binary is built.
  sitl-tests:
    name: SITL integration (Linux)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'sitl')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache ArduPilot SITL build
        uses: actions/cache@v4
        with:
          path: .sitl
          key: ${{ runner.os }}-ardupilot-sitl-${{ hashFiles('tests/build-sitl.sh') }}

      - name: Build ArduPilot SITL
        run: tests/build-sitl.sh

      # Run each vehicle's tests in its own process (one MAVLinkInterface per
      # process is the supported usage).
      - name: Test (copter)
        env:
          SITL_BIN_DIR: ${{ github.workspace }}/.sitl/ardupilot/build/sitl/bin
          SITL_SPEEDUP: "5"
        run: >
          dotnet test MissionPlannerTests.Sitl/MissionPlannerTests.Sitl.csproj
          -f net8.0
          -c Debug
          --filter "TestCategory=Sitl"
          --logger "trx;LogFileName=sitl-copter.trx"
          --results-directory TestResults

      - name: Test (plane)
        env:
          SITL_BIN_DIR: ${{ github.workspace }}/.sitl/ardupilot/build/sitl/bin
          SITL_SPEEDUP: "5"
        run: >
          dotnet test MissionPlannerTests.SitlPlane/MissionPlannerTests.SitlPlane.csproj
          -f net8.0
          -c Debug
          --filter "TestCategory=Sitl"
          --logger "trx;LogFileName=sitl-plane.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitl-test-results
          path: TestResults/*.trx
